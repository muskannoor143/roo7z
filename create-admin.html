<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Test Admin - Roo7z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #214740, #2a5f5a); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 40px; max-width: 400px; }
        .btn { background: linear-gradient(135deg, #214740, #2a5f5a); border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">Create Test Admin</h2>
        <div id="alert"></div>
        <form id="createAdminForm">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" id="email" value="admin@roo7z.com" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" id="password" value="password123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Admin</button>
        </form>
    </div>

    <script type="module">
        import { auth, db, doc, setDoc, createUserWithEmailAndPassword } from './js/firebase.js';

        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alert');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;

                // Add to admins collection
                await setDoc(doc(db, 'admins', uid), {
                    email: email,
                    createdAt: new Date()
                });

                alertDiv.innerHTML = '<div class="alert alert-success">Test admin created successfully!</div>';
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
