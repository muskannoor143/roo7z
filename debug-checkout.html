<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Debug Checkout - Roo7z</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Checkout Debug Page</h1>
    
    <div class="debug-section info">
        <h3>Debug Information</h3>
        <div id="debug-info"></div>
    </div>
    
    <div class="debug-section">
        <h3>Test Actions</h3>
        <button onclick="checkElements()">Check DOM Elements</button>
        <button onclick="testCartAdd()">Add Test Item</button>
        <button onclick="testCheckout()">Test Checkout Flow</button>
        <button onclick="clearDebug()">Clear Debug</button>
    </div>
    
    <div class="debug-section">
        <h3>Console Output</h3>
        <div id="console-output" style="background: #f8f9fa; padding: 10px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <script>
        // Override console.log to capture output
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('console-output');
        
        function addToConsole(type, ...args) {
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' ');
            consoleOutput.textContent += `[${timestamp}] ${type.toUpperCase()}: ${message}\n`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = (...args) => {
            originalLog(...args);
            addToConsole('log', ...args);
        };
        
        console.error = (...args) => {
            originalError(...args);
            addToConsole('error', ...args);
        };
        
        function updateDebugInfo(message, type = 'info') {
            const debugDiv = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
        }
        
        function checkElements() {
            console.log('Checking DOM elements...');
            
            const elements = {
                'checkout-overlay': document.getElementById('checkout-overlay'),
                'checkout-form': document.getElementById('checkout-form'),
                'univ-checkout': document.getElementById('univ-checkout'),
                'univ-cart-sidebar': document.getElementById('univ-cart-sidebar'),
                'univ-cart-items': document.getElementById('univ-cart-items')
            };
            
            for (const [name, element] of Object.entries(elements)) {
                if (element) {
                    console.log(`✓ ${name} found`);
                    updateDebugInfo(`✓ ${name} found`, 'success');
                } else {
                    console.error(`✗ ${name} NOT found`);
                    updateDebugInfo(`✗ ${name} NOT found`, 'error');
                }
            }
        }
        
        function testCartAdd() {
            console.log('Testing cart add functionality...');
            
            const testItem = {
                id: 'debug-test-1',
                title: 'Debug Test Product',
                img: 'https://via.placeholder.com/150',
                pricePKR: 500,
                priceGBP: 5,
                qty: 1
            };
            
            try {
                const evt = new CustomEvent("universal-add-to-cart", { detail: testItem });
                document.dispatchEvent(evt);
                console.log('Cart add event dispatched successfully');
                updateDebugInfo('Cart add event dispatched', 'success');
            } catch (error) {
                console.error('Error adding to cart:', error);
                updateDebugInfo(`Error adding to cart: ${error.message}`, 'error');
            }
        }
        
        function testCheckout() {
            console.log('Testing checkout flow...');
            
            // First add an item
            testCartAdd();
            
            // Wait a bit then try checkout
            setTimeout(() => {
                const checkoutBtn = document.getElementById('univ-checkout');
                if (checkoutBtn) {
                    console.log('Clicking checkout button...');
                    checkoutBtn.click();
                    updateDebugInfo('Checkout button clicked', 'info');
                } else {
                    console.error('Checkout button not found');
                    updateDebugInfo('Checkout button not found', 'error');
                }
            }, 1000);
        }
        
        function clearDebug() {
            document.getElementById('debug-info').innerHTML = '';
            document.getElementById('console-output').textContent = '';
        }
        
        // Auto-check elements on load
        window.addEventListener('load', () => {
            setTimeout(checkElements, 1000);
        });
    </script>
</body>
</html>
