  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
    }

    .user-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .user-sidebar {
      width: 220px;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    .user-sidebar h2 {
      font-size: 28px;
      margin-bottom: 20px;
      margin-top: 90px;
      color: #fefefe;
    }
    .user-sidebar a {
      display: block;
      color: #fefefe;
      text-decoration: none;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }
    .user-sidebar a:hover {
      color: #fff;
    }

    /* Main Content */
    .user-main {
      flex: 1;
      padding: 90px;
    }

    .profile-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .profile-pic {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #007BFF;
      flex-shrink: 0;
    }
    .profile-pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Edit Icon */
    .edit-icon {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translate(-50%, 50%);
      background: #007BFF;
      color: #fff;
      border-radius: 50%;
      padding: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }
    .edit-icon:hover {
      background: #0056b3;
    }

    .profile-details h3 {
      margin: 0;
      color: #007BFF;
    }
    .profile-details p {
      margin: 4px 0;
      color: #333;
    }

    .back-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #0b0b0b;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
    }
    .back-btn:hover {
      background: #f5f6f7;
      color: #0b0b0b;
    }

    .orders-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    table th, table td {
      border: 1px solid #eee;
      padding: 8px;
      text-align: left;
    }
    table th {
      background: #f1f1f1;
    }

    .logout-btn {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    .logout-btn:hover {
      background: #b52a36;
    }

    #profilePicInput {
      display: none;
    }

    /* Hover effects for edit buttons */
    #saveNameBtn:hover {
      background: #218838;
    }
    #cancelNameBtn:hover {
      background: #c82333;
    }

    .profile-card > p,
    .orders-card > p {
      color: #1f2937;
      opacity: 1;
      margin: 0;
      letter-spacing: normal;
    }

    @media (max-width: 768px) {
      .user-container {
        padding-top: 92px !important;

      }
    }

    @media (max-width: 480px) {

<div class="user-container">
  <!-- Sidebar -->
  <aside class="user-sidebar">
    <h2>My Account</h2>
    <a href="user.html">Profile</a>
    <a href="#orders">Orders</a>
  </aside>

  <!-- Main Content -->
  <main class="user-main">
    <div class="profile-card" id="user-info"></div>
    <div class="orders-card" id="orderHistory"></div>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Website</a>
  </main>

<script type="module">
import {
  auth,
  db,
  onAuthStateChanged,
  signOut,
  doc,
  getDoc,
  collection,
  getDocs,
  updateDoc
} from "./js/firebase.js";

const userInfoDiv = document.getElementById("user-info");
const orderHistoryDiv = document.getElementById("orderHistory");

onAuthStateChanged(auth, async (user) => {
  if (user) {
    orderHistoryDiv.style.display = "block";
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.exists() ? userSnap.data() : {};

    userInfoDiv.innerHTML = `
      <div class="profile-pic">
        <img src="${userData.pic || 'images/roo7z-logo.png'}" id="profileImg">
        <i class="fas fa-pen edit-icon" id="editPicBtn"></i>
        <input type="file" id="profilePicInput" accept="image/*">
      </div>
      <div class="profile-details">
        <div style="display: flex; align-items: center; gap: 5px;">
          <h3 id="userNameDisplay">${userData.username || user.displayName || "User"}</h3>
          <i class="fas fa-pen" id="editNameBtn" style="font-size: 12px; cursor: pointer; color: #007BFF;"></i>
        </div>
        <p><strong>Email:</strong> ${user.email}</p>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    `;

    const ordersRef = collection(db, "users", user.uid, "orders");
    const ordersSnap = await getDocs(ordersRef);

    const ordersTable = document.createElement("table");
    ordersTable.innerHTML = `
      <tr>
        <th>Date</th>
        <th>Items</th>
        <th>Total</th>
      </tr>
    `;

    ordersSnap.forEach((docSnap) => {
      const order = docSnap.data();
      const date = order.date
        ? new Date(order.date.seconds * 1000).toLocaleDateString()
        : "N/A";
      const currency = order.currency || "PKR";
      const total = new Intl.NumberFormat(
        currency === "GBP" ? "en-GB" : "en-PK",
        { style: "currency", currency }
      ).format(order.total || 0);

      const itemsList = (order.items || [])
        .map((it) => `${it.qty}x ${it.title}`)
        .join(", ");

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${date}</td>
        <td>${itemsList}</td>
        <td>${total}</td>
      `;
      ordersTable.appendChild(tr);
    });

    orderHistoryDiv.innerHTML = "<h3>Order History</h3>";
    orderHistoryDiv.appendChild(ordersTable);

    const editBtn = document.getElementById("editPicBtn");
    const fileInput = document.getElementById("profilePicInput");
    const profileImg = document.getElementById("profileImg");

    editBtn?.addEventListener("click", () => fileInput.click());
    fileInput?.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function (event) {
        profileImg.src = event.target.result;
        await updateDoc(userRef, { pic: event.target.result });
      };
      reader.readAsDataURL(file);
    });

    const editNameBtn = document.getElementById("editNameBtn");
    const userNameDisplay = document.getElementById("userNameDisplay");

    editNameBtn?.addEventListener("click", () => {
      const currentName = userNameDisplay.textContent;
      userNameDisplay.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-top:7px;padding:10px;background:#f8f9fa;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.06);">
          <input type="text" id="nameInput" value="${currentName}" style="padding:3px 5px;border:1px solid #d1d5db;border-radius:6px;font-size:18px;width:190px;outline:none;transition:0.2s;">
          <button id="saveNameBtn" style="padding:7px 14px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;">Save</button>
          <button id="cancelNameBtn" style="padding:7px 14px;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;">Cancel</button>
        </div>
      `;

      document.getElementById("saveNameBtn").addEventListener("click", async () => {
        const newName = document.getElementById("nameInput").value.trim();
        if (newName) {
          await updateDoc(userRef, { username: newName });
          userNameDisplay.innerHTML = newName;
        } else {
          userNameDisplay.innerHTML = currentName;
        }
      });

      document.getElementById("cancelNameBtn").addEventListener("click", () => {
        userNameDisplay.innerHTML = currentName;
      });
    });

    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  } else {
    const overlay = document.getElementById("univ-auth-overlay");
    if (overlay) overlay.classList.add("open");
    userInfoDiv.innerHTML = "<p>Please login to see your account details.</p>";
    orderHistoryDiv.style.display = "none";
    orderHistoryDiv.innerHTML = "";
  }
});
</script>
