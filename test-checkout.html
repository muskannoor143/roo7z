<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Checkout - Roo7z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .test-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .test-btn { margin: 10px; padding: 15px 30px; }
        .status { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Checkout Test - Roo7z</h1>
        <p>Is page se aap checkout functionality test kar sakte hain.</p>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Test Actions</h3>
                <button id="add-test-item" class="btn btn-primary test-btn">Add Test Item to Cart</button>
                <button id="open-cart" class="btn btn-secondary test-btn">Open Cart Sidebar</button>
                <button id="test-checkout-direct" class="btn btn-success test-btn">Direct Checkout Test</button>
                <button id="clear-cart" class="btn btn-warning test-btn">Clear Cart</button>
            </div>
            <div class="col-md-6">
                <h3>Debug Info</h3>
                <div id="debug-info" class="border p-3" style="height: 200px; overflow-y: auto; background: #f8f9fa;"></div>
            </div>
        </div>
        
        <div id="status" class="mt-3"></div>
    </div>

    <!-- Cart sidebar -->
    <aside id="univ-cart-sidebar" class="univ-cart-sidebar" aria-hidden="true">
        <div class="univ-cart-head">
            <div>
                <strong>Your Cart</strong>
                <div class="muted small" id="univ-cart-items-count">0 items</div>
            </div>
            <button id="univ-close-cart" class="univ-close-btn" aria-label="Close cart">✖</button>
        </div>
        <div id="univ-cart-items" class="univ-cart-items"></div>
        <div class="univ-cart-footer">
            <div class="univ-subtotal">Subtotal: <strong id="univ-cart-subtotal">PKR 0</strong></div>
            <div class="univ-cart-actions">
                <button id="univ-checkout" class="btn">Checkout</button>
                <button id="univ-clear-cart" class="btn ghost">Clear</button>
            </div>
        </div>
    </aside>

    <!-- Auth modal -->
    <div id="univ-auth-overlay" class="univ-overlay" aria-hidden="true">
        <div class="univ-modal" role="dialog" aria-modal="true" aria-labelledby="univ-auth-title">
            <div class="univ-auth-head">
                <h3 id="univ-auth-title">Login to Roo7z</h3>
                <button id="univ-close-auth" class="univ-close-btn" aria-label="Close auth">✖</button>
            </div>
            <form id="univ-auth-form" class="univ-auth-form">
                <label class="small">Email
                    <input type="email" id="univ-email" required />
                </label>
                <label class="small">Password
                    <input type="password" id="univ-password" minlength="6" required />
                </label>
                <div style="display:flex;gap:8px;margin-top:8px">
                    <button id="univ-auth-submit" class="btn" type="submit">Login</button>
                    <button id="univ-toggle-auth" type="button" class="btn ghost">Create account</button>
                </div>
                <div id="univ-auth-msg" class="muted small" style="display:none;margin-top:8px"></div>
            </form>
        </div>
    </div>

    <!-- Checkout Form -->
    <div id="checkout-overlay" class="checkout-overlay">
        <form id="checkout-form" class="checkout-form">
            <div class="checkout-header">
                <h2>Secure Checkout</h2>
                <p>Complete your order with confidence</p>
            </div>
            <div class="form-section">
                <h3>Delivery Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="checkout-name">Full Name</label>
                        <input type="text" id="checkout-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="checkout-email">Email Address</label>
                        <input type="email" id="checkout-email" required placeholder="Enter your email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="checkout-address">Delivery Address</label>
                    <input type="text" id="checkout-address" required placeholder="Enter your full address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="checkout-city">City</label>
                        <input type="text" id="checkout-city" required placeholder="Enter your city">
                    </div>
                    <div class="form-group">
                        <label for="checkout-phone">Phone Number</label>
                        <input type="tel" id="checkout-phone" required placeholder="Enter your phone number">
                    </div>
                </div>
            </div>
            <div class="form-section">
                <h3>Payment Method</h3>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="cod" checked required>
                        <div class="payment-card">
                            <div class="payment-icon">COD</div>
                            <div class="payment-info">
                                <span class="payment-title">Cash on Delivery</span>
                                <span class="payment-desc">Pay when you receive</span>
                            </div>
                        </div>
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" id="close-checkout" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Confirm Order</button>
            </div>
                </form>
        </div>

        <!-- Checkout CSS -->
        <style>
        .checkout-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .checkout-overlay.show {
            display: flex !important;
        }

        .checkout-form {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .checkout-header h2 {
            margin: 0 0 5px 0;
            color: #214740;
            font-size: 24px;
            font-weight: 600;
        }

        .checkout-header p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section h3 {
            margin: 0 0 15px 0;
            color: #214740;
            font-size: 18px;
            font-weight: 500;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #214740;
            box-shadow: 0 0 0 3px rgba(33, 71, 64, 0.1);
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .payment-option {
            position: relative;
            cursor: pointer;
        }

        .payment-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .payment-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .payment-option input[type="radio"]:checked + .payment-card {
            border-color: #214740;
            background: #f0f8f5;
            box-shadow: 0 0 0 3px rgba(33, 71, 64, 0.1);
        }

        .payment-icon {
            font-size: 24px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #214740;
            color: white;
            border-radius: 8px;
        }

        .payment-info {
            flex: 1;
        }

        .payment-title {
            display: block;
            font-weight: 600;
            color: #214740;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .payment-desc {
            display: block;
            color: #666;
            font-size: 12px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #214740, #2a5f5a);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2a5f5a, #214740);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(33, 71, 64, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e1e1e1;
        }

        .btn-secondary:hover {
            background: #e1e1e1;
            color: #333;
        }
    </style>

    <script type="module" src="js/products.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/cart-login.js"></script>
    
    <script>
        function log(message) {
            const debugDiv = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(message);
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // Test functionality
        document.getElementById('add-test-item').addEventListener('click', () => {
            const testItem = {
                id: 'test-' + Date.now(),
                title: 'Test Product',
                img: 'https://via.placeholder.com/150',
                pricePKR: 1000,
                priceGBP: 10,
                qty: 1
            };
            
            log('Adding test item to cart...');
            const evt = new CustomEvent("universal-add-to-cart", { detail: testItem });
            document.dispatchEvent(evt);
            
            showStatus('Test item added to cart!', 'success');
        });
        
        document.getElementById('open-cart').addEventListener('click', () => {
            log('Opening cart sidebar...');
            const sidebar = document.getElementById('univ-cart-sidebar');
            if (sidebar) {
                sidebar.classList.add('open');
                showStatus('Cart sidebar opened!', 'info');
            } else {
                showStatus('Cart sidebar not found!', 'error');
            }
        });
        
        document.getElementById('test-checkout-direct').addEventListener('click', () => {
            log('Testing direct checkout...');
            const checkoutOverlay = document.getElementById('checkout-overlay');
            if (checkoutOverlay) {
                checkoutOverlay.style.display = 'flex';
                checkoutOverlay.classList.add('show');
                showStatus('Checkout form opened directly!', 'success');
            } else {
                showStatus('Checkout overlay not found!', 'error');
            }
        });

        document.getElementById('clear-cart').addEventListener('click', () => {
            log('Clearing cart...');
            localStorage.removeItem('roo7z_cart');
            showStatus('Cart cleared!', 'info');
        });

        // Monitor checkout button clicks
        document.addEventListener('click', (e) => {
            if (e.target.id === 'univ-checkout') {
                log('Checkout button clicked from cart!');
            }
            if (e.target.id === 'close-checkout') {
                log('Checkout form closed');
                const checkoutOverlay = document.getElementById('checkout-overlay');
                if (checkoutOverlay) {
                    checkoutOverlay.style.display = 'none';
                    checkoutOverlay.classList.remove('show');
                }
            }
        });

        // Monitor form submission
        document.addEventListener('submit', (e) => {
            if (e.target.id === 'checkout-form') {
                log('Checkout form submitted!');
                showStatus('Checkout form submitted successfully!', 'success');
            }
        });

        log('Test page loaded successfully');
    </script>
</body>
</html>
