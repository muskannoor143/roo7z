<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>Admin Login - Roo7z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #214740, #2a5f5a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: #214740;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            margin: 0;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 12px 15px;
        }

        .form-control:focus {
            border-color: #214740;
            box-shadow: 0 0 0 0.2rem rgba(33, 71, 64, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, #214740, #2a5f5a);
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 71, 64, 0.4);
        }

        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #214740;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="images/roo7z-logo.png" alt="Roo7z Logo" class="admin-logo">
            <h2>Admin Login</h2>
            <p>Please sign in to access the admin panel</p>
        </div>

        <div id="alertContainer"></div>

        <form id="adminLoginForm">
            <div class="form-floating">
                <input type="email" class="form-control" id="adminEmail" placeholder="admin@roo7z.com" required>
                <label for="adminEmail">Email address</label>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
                <label for="adminPassword">Password</label>
            </div>

            <button type="submit" class="btn btn-login" id="loginBtn">
                <span class="btn-text">Sign In</span>
            </button>
        </form>

        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
            <span>Signing in...</span>
        </div>
    </div>

    <script type="module">
        import {
            auth,
            db,
            doc,
            getDoc,
            signInWithEmailAndPassword,
            onAuthStateChanged
        } from './js/firebase.js';

        // DOM elements
        const loginForm = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('adminEmail');
        const passwordInput = document.getElementById('adminPassword');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.querySelector('.btn-text');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const alertContainer = document.getElementById('alertContainer');

        // Show alert function
        function showAlert(message, type = 'danger') {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Check if user is admin
                checkAdminStatus(user);
            }
        });

        // Check admin status
        async function checkAdminStatus(user) {
            try {
                // Use Firebase SDK to check admin status
                const adminDocRef = doc(db, 'admins', user.uid);
                const adminDoc = await getDoc(adminDocRef);
                
                if (adminDoc.exists()) {
                    // User is admin, redirect to admin panel
                    window.location.href = 'admin.html';
                } else {
                    // Not an admin
                    showAlert('Access denied. Admin privileges required.', 'danger');
                    await auth.signOut();
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                showAlert('Error verifying admin status. Please try again.', 'danger');
            }
        }

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showAlert('Please fill in all fields.', 'warning');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            btnText.textContent = 'Signing In...';
            loadingSpinner.style.display = 'block';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Check if user is admin
                await checkAdminStatus(user);

            } catch (error) {
                console.error('Login error:', error);

                let errorMessage = 'Login failed. Please try again.';

                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email address.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed login attempts. Please try again later.';
                        break;
                }

                showAlert(errorMessage, 'danger');

                // Reset loading state
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                loadingSpinner.style.display = 'none';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
